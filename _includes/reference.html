<div class="row">
  <div id="{{key}}" class="col-sm-11">
    <!-- Entry bib key -->
    [{{include.key}}]
    <!-- Authors -->
    <div class="author" style="display: inline">
      {{include.authors}}:
    </div>
    <!-- Title -->
    <div class="title">
      <b><u><a href="{{include.url}}">{{include.title}}</a>.</u></b>
    </div>
    <!-- Rest -->
    <div class="periodical" style="display: inline">
      {{include.info}}
    </div>
  </div>
</div>
